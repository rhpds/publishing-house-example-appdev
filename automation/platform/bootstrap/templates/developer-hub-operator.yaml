{{- if .Values.operators.developerHub.enabled }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: redhat-developer-hub
  labels:
    app.kubernetes.io/part-of: ocp-appdev-quicklabs
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: rhdh-operator-group
  namespace: redhat-developer-hub
  labels:
    app.kubernetes.io/part-of: ocp-appdev-quicklabs
spec: {}
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhdh
  namespace: openshift-operators
  labels:
    app.kubernetes.io/part-of: ocp-appdev-quicklabs
spec:
  channel: {{ .Values.operators.developerHub.channel }}
  installPlanApproval: Automatic
  name: rhdh
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  startingCSV: {{ .Values.operators.developerHub.startingCSV }}
{{- end }}
