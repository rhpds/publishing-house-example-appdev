apiVersion: v2
name: ocp-appdev-quicklabs-tenant
description: >-
  Per-tenant bootstrap for OpenShift App Dev Quick Labs.
  Provisions namespace, Postcard Generator app, Gitea user/repos,
  and lab-specific resources controlled by feature flags.
type: application
version: 0.1.0
appVersion: "1.0.0"
dependencies:
  - name: postcard-generator
    version: 0.1.0
    repository: file://../labs/postcard-generator
    condition: labs.postcardGenerator.enabled
