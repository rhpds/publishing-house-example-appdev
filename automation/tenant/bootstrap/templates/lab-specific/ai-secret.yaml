{{- if .Values.labs.ai.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: postcard-ai-config
  namespace: {{ include "tenant.namespace" . }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
type: Opaque
stringData:
  MODEL_ENDPOINT: {{ .Values.labs.ai.modelEndpoint | quote }}
{{- if .Values.labs.ai.modelApiKeySecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: postcard-ai-apikey
  namespace: {{ include "tenant.namespace" . }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
type: Opaque
data:
  API_KEY: ""  # Populated by external-secrets or AgnosticV workload
{{- end }}
{{- end }}
