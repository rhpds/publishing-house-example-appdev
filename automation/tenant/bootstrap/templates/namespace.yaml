apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "tenant.namespace" . }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
  annotations:
    openshift.io/display-name: "Postcard Generator - {{ .Values.tenant.user.name }}"
    openshift.io/description: "Tenant namespace for {{ .Values.tenant.user.name }} App Dev Quick Lab"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.tenant.user.name }}-admin
  namespace: {{ include "tenant.namespace" . }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
subjects:
  - kind: User
    apiGroup: rbac.authorization.k8s.io
    name: {{ .Values.tenant.user.name }}
roleRef:
  kind: ClusterRole
  apiGroup: rbac.authorization.k8s.io
  name: admin
