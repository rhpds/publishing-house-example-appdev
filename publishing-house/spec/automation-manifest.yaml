# Automation Manifest
# Describes what the lab/demo environment needs pre-configured.
# Review and approve this before automation code is written.

approach: both
# Ansible for cluster-level operator installation.
# GitOps for per-tenant application deployment and configuration.

# -------------------------------------------------------------------
# Infrastructure
# -------------------------------------------------------------------
infrastructure:
  type: sandbox-cluster-tenant
  ocp_version: "4.21"
  multi_user: true
  users_per_deployment: 30

# -------------------------------------------------------------------
# Operators (cluster-level, installed once)
#
# These are operators the learner USES, not installs.
# -------------------------------------------------------------------
operators:
  - name: Red Hat OpenShift Pipelines
    channel: pipelines-1.21
    namespace: openshift-operators
    reason: "Lab 3 uses Tekton pipelines to build and deploy the Postcard Generator"
    source_module: module-03-build-and-deploy-with-pipelines

  - name: Red Hat OpenShift GitOps
    channel: latest
    namespace: openshift-operators
    reason: "Lab 4 uses ArgoCD to demonstrate drift detection and sync"
    source_module: module-04-gitops-and-drift-control

  - name: Red Hat OpenShift Dev Spaces
    channel: stable
    namespace: openshift-devspaces
    reason: "Lab 2 uses Dev Spaces for inner loop development with live reload"
    source_module: module-02-live-coding-with-dev-spaces

  - name: Red Hat Developer Hub
    channel: fast
    namespace: rhdh
    reason: "Lab 1 uses Developer Hub to scaffold the Postcard Generator from a golden path template"
    source_module: module-01-scaffold-with-developer-hub

  - name: Red Hat OpenShift AI
    channel: fast
    namespace: redhat-ods-operator
    reason: "Lab 5 uses MaaS endpoint for AI-generated postcard messages"
    source_module: module-05-smart-postcards-with-ai

  - name: Keycloak (Authentication)
    channel: stable-v26.4
    namespace: keycloak
    reason: "All labs require per-user authentication via Keycloak"
    source_module: all

  - name: Gitea Operator
    channel: v2.1.0
    namespace: gitea
    reason: "All labs use per-user Gitea repos for source code and deployment manifests"
    source_module: all

# -------------------------------------------------------------------
# Applications (per-tenant, deployed for each user)
#
# These must exist BEFORE the learner starts the lab.
# -------------------------------------------------------------------
applications:
  - name: postcard-generator
    description: "The Postcard Generator Flask app — the sample application for all labs"
    namespace: "{{ user }}-postcard-generator"
    image: "TBD — must be built and published to a registry"
    resources:
      - kind: Deployment
      - kind: Service
      - kind: Route
    reason: >
      Labs 2-5 start with 'open the Postcard Generator' or 'your app is deployed.'
      Lab 1 scaffolds it via Developer Hub (so it does NOT need a pre-deployed app,
      but it does need the source repo and golden path template).
    source_module: module-02 through module-05
    notes: >
      Lab 1 is the exception — the app is created during the lab via Developer Hub.
      Labs 2-5 need the app already deployed and accessible via route.

  - name: postcard-generator-deploy-repo
    description: "Gitea repo with Kubernetes deployment manifests (Deployment, Service, Route YAML)"
    namespace: "gitea"
    resources:
      - kind: Gitea Repository
    reason: "Lab 4 has the learner edit deployment YAML in Gitea to make a legitimate GitOps change"
    source_module: module-04-gitops-and-drift-control

# -------------------------------------------------------------------
# RBAC (per-tenant)
# -------------------------------------------------------------------
rbac:
  - type: namespace
    name: "{{ user }}-postcard-generator"
    reason: "Per-user namespace for the Postcard Generator deployment and lab exercises"

  - type: role-binding
    role: edit
    subjects: "{{ user }}"
    namespace: "{{ user }}-postcard-generator"
    reason: "Learner needs edit access to modify deployments, create resources, and set env vars"

  - type: role-binding
    role: view
    subjects: "{{ user }}"
    namespace: openshift-gitops
    reason: "Lab 4 requires the learner to view ArgoCD resources in the openshift-gitops namespace"

# -------------------------------------------------------------------
# Seed data (per-tenant)
# -------------------------------------------------------------------
seed_data:
  - type: git-repo
    name: postcard-generator
    url: "TBD — GitHub repo with Postcard Generator source code"
    target: gitea
    reason: >
      All labs reference the Postcard Generator source in Gitea.
      Must include: Flask app, destinations.json, devfile.yaml,
      postcard templates, CSS, ai_client.py (disabled by default).
    source_module: all

  - type: git-repo
    name: postcard-generator-deploy
    url: "TBD — GitHub repo with Kubernetes manifests for the Postcard Generator"
    target: gitea
    reason: "Lab 4 has the learner edit deployment manifests in this separate repo"
    source_module: module-04-gitops-and-drift-control

  - type: golden-path-template
    name: postcard-generator-template
    target: developer-hub
    reason: >
      Lab 1 scaffolds the app from this template. The template must:
      create a Gitea repo, commit source code, create a Tekton Pipeline,
      create Kubernetes manifests, create an ArgoCD Application, and
      trigger the initial deployment.
    source_module: module-01-scaffold-with-developer-hub
    notes: >
      This is the most complex automation item. The template must be
      a Backstage Software Template registered in Developer Hub with
      Gitea, ArgoCD, and Tekton integrations configured.

  - type: secret
    name: postcard-ai-config
    namespace: "{{ user }}-postcard-generator"
    data:
      POSTCARD_AI_ENDPOINT: "TBD — MaaS endpoint URL"
      POSTCARD_AI_API_KEY: "TBD — MaaS API key (from LiteLLM or RHOAI)"
    reason: "Lab 5 toggles AI on and references this Secret for the MaaS endpoint"
    source_module: module-05-smart-postcards-with-ai

# -------------------------------------------------------------------
# Per-lab automation (what makes each tenant CI unique)
# -------------------------------------------------------------------
per_lab_config:
  lab01-devhub:
    description: "Golden path template registered in RHDH, no pre-deployed app"
    unique_workloads:
      - "Register golden path template for the user (or globally)"
    does_not_need:
      - "Pre-deployed Postcard Generator app (user scaffolds it)"

  lab02-devspaces:
    description: "Pre-deployed app, Gitea repo with devfile.yaml"
    unique_workloads:
      - "Deploy Postcard Generator app to user namespace"
      - "Ensure devfile.yaml is present in the Gitea source repo"

  lab03-pipelines:
    description: "Pre-deployed app, Tekton Pipeline + triggers + webhook"
    unique_workloads:
      - "Deploy Postcard Generator app to user namespace"
      - "Create Tekton Pipeline (git-clone, build, test, deploy tasks)"
      - "Create TriggerTemplate, TriggerBinding, EventListener"
      - "Configure Gitea webhook to EventListener route"

  lab04-gitops:
    description: "Pre-deployed app managed by ArgoCD Application"
    unique_workloads:
      - "Deploy Postcard Generator app to user namespace"
      - "Create postcard-generator-deploy repo in Gitea with K8s manifests"
      - "Create ArgoCD Application CR pointing to the deploy repo"
      - "Set ArgoCD sync policy to manual (so user observes drift)"

  lab05-ai:
    description: "Pre-deployed app with AI feature disabled, MaaS Secret"
    unique_workloads:
      - "Deploy Postcard Generator app (POSTCARD_AI_ENABLED=false)"
      - "Create postcard-ai-config Secret with MaaS endpoint and API key"

# -------------------------------------------------------------------
# Network
# -------------------------------------------------------------------
network:
  - type: route
    name: postcard-generator
    service: postcard-generator
    namespace: "{{ user }}-postcard-generator"
    reason: "All labs require the Postcard Generator to be reachable via a browser"

# -------------------------------------------------------------------
# Broken resources
# -------------------------------------------------------------------
broken_resources: []
# No troubleshooting exercises in these labs

# -------------------------------------------------------------------
# Provision data (returned to RHDP after deployment)
# -------------------------------------------------------------------
provision_data:
  - key: openshift_console_url
    value: "https://console-openshift-console.{{ deployer.domain }}"
    description: "OpenShift Console URL"

  - key: user
    value: "{{ ocp4_workload_tenant_keycloak_username }}"
    description: "Username for all lab logins"

  - key: password
    value: "{{ common_password }}"
    description: "Password for all lab logins"

  - key: devhub_url
    value: "https://developer-hub-rhdh.{{ deployer.domain }}"
    description: "Red Hat Developer Hub URL (Lab 1)"

  - key: devspaces_url
    value: "https://devspaces.{{ deployer.domain }}"
    description: "OpenShift Dev Spaces URL (Lab 2)"

  - key: gitea_url
    value: "https://gitea.{{ deployer.domain }}"
    description: "Gitea URL for source code"

  - key: gitea_user
    value: "{{ ocp4_workload_tenant_keycloak_username }}"
    description: "Gitea username (same as OpenShift user)"

  - key: gitea_password
    value: "{{ common_password }}"
    description: "Gitea password (same as OpenShift password)"

  - key: argocd_url
    value: "https://openshift-gitops-server-openshift-gitops.{{ deployer.domain }}"
    description: "ArgoCD URL (Lab 4)"

  - key: postcard_app_url
    value: "https://postcard-generator-{{ user }}-postcard-generator.{{ deployer.domain }}"
    description: "Postcard Generator application URL"

# -------------------------------------------------------------------
# Notes
# -------------------------------------------------------------------
notes: |
  Key dependency: The Postcard Generator app must be built as a container image
  and published to a registry (quay.io/rhpds/postcard-generator or similar)
  BEFORE the automation can deploy it. This is a prerequisite for all tenant CIs
  except Lab 1 (which scaffolds the app via Developer Hub).

  The most complex automation item is the Developer Hub golden path template
  (Lab 1). It needs Backstage template YAML that integrates with Gitea (repo
  creation), Tekton (pipeline setup), and ArgoCD (application creation).

  For MaaS (Lab 5), the recommended approach is LiteLLM with a virtual key
  provisioned per-user. This avoids exposing a shared API key and enables
  usage tracking. Check if the LiteLLM workload collection
  (rhpds.litellm_virtual_keys) can be used.

  GitOps approach: Per-tenant workloads (app deployment, ArgoCD Applications,
  Tekton Pipelines, Secrets) should be deployed via a GitOps bootstrap chart
  in a dedicated automation repo, following the ocp4-getting-started pattern.
  The cluster-level operators are deployed via Ansible workloads in the Cluster CI.
